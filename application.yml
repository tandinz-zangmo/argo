apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-app-tandin-branch
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tandinz-zangmo/argo.git
    targetRevision: tandin
    path: . 
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
